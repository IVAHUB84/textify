# Production CD — Textify (ivahub, 138.16.226.66:2222).
# Контракт поставки — см. deploy-guide.md (профиль «бот без HTTP-порта», ADR-001).
# Образ публикуется в GHCR (владелец в lowercase — требование GHCR).
# Сборка идёт всегда; деплой включается переменной репозитория DEPLOY_ENABLED=true
# и требует секреты: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT, DISCORD_WEBHOOK.
# Адресат деплоя — ivahub (не app-01).
name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/ivahub84/${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_TOKEN,GHCR_USER
          # ivahub has a slow/flaky network — image layer pulls can be long.
          # Give the command a wide window and retry the pull a few times so a
          # transient stall doesn't fail the whole deploy (the build is already done).
          command_timeout: 30m
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/apps/${{ github.event.repository.name }}
            for attempt in 1 2 3 4 5; do
              echo "docker compose pull (attempt $attempt)"
              if docker compose pull; then break; fi
              if [ "$attempt" = "5" ]; then echo "pull failed after retries" >&2; exit 1; fi
              sleep 15
            done
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io

  notify:
    needs: [build, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PRODUCT: ${{ github.event.repository.name }}
          REF: ${{ github.ref_name }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK не задан — пропускаю уведомление."
            exit 0
          fi
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.deploy.result }}" = "success" ]; then
            STATUS="✅ success"; COLOR=3066993
          else
            STATUS="❌ failure"; COLOR=15158332
          fi
          SHA7="${GITHUB_SHA::7}"
          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"deploy $PRODUCT: $STATUS\",\"description\":\"\`$REF\` @ \`$SHA7\`\",\"color\":$COLOR}]}"
