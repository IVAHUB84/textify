services:
  bot:
    image: ghcr.io/ivahub84/textify:latest
    restart: unless-stopped
    env_file: .env
    # На ivahub маршрут к части IP Telegram (включая тот, что отдаёт DNS для
    # api.telegram.org) блокируется на сетевом уровне. Пиннинг на достижимый
    # Telegram-DC, чтобы long-polling работал. Если IP перестанет отвечать —
    # подобрать другой рабочий DC или настроить исходящий прокси.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
